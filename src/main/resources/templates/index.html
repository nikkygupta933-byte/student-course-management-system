<!Doctype html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<title>Students</title>
		<meta name="viewport" content="width=device-width,initial-scale=1">
	
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
	</head>
	<body>
		<div class="container p-2">
			<div class="card">
				<div class="card-body ">
					<div th:switch="${students}" class ="contaier my-5">
						<p class="my-5">
						<a href="/students/signup" class="btn btn-primary"> <i class="bi bi-person-plus"></i></a>
						</p>
						<div class="col-md-10">
							<h2 th:case="null">No Students yet!</h2>
							<div th:case ="*">
								<table class="table table-striped table-responsive-md">
								<thead>
									<tr>
										<th>Name</th>
										<th>Group</th>
										<th>Course</th>
										<th>Action</th>
										
									</tr>
								</thead>
								<tbody>
									<tr th:each="student : ${students}">
										<td th:text="${student.name}"></td>
										<td th:text="${student.studentGroup}"></td>
										<td th:text="${student.course}"></td>
										<td>
											<a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-primary"><i class="bi bi-pencil-square"></i></a>
											<a th:href="@{/students/delete/{id}(id=${student.id})}" class="btn btn-primary"><i class="bi bi-trash"></i></a>
										</td>
										</tr>
								</tbody>
								</table>
							</div>
					</div>
					</div>
					
				</div>
			</div>
		</div>
		
		
		
	</body>
	</html>
